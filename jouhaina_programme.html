<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jouhaina — Programme 12 Semaines</title>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c20;
    --border: rgba(255,255,255,0.07);
    --text: #f0eee8;
    --muted: rgba(240,238,232,0.45);
    --accent: #c8a97e;
    --accent2: #e8c99a;
    --p1: #4a7fa5;
    --p2: #c87a3a;
    --p3: #b05040;
    --p1bg: rgba(74,127,165,0.12);
    --p2bg: rgba(200,122,58,0.12);
    --p3bg: rgba(176,80,64,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Header */
  .header {
    padding: 48px 40px 0;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: 'J';
    position: absolute;
    right: -10px;
    top: -40px;
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 280px;
    color: rgba(200,169,126,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 8px;
  }
  .program-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .program-title {
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .program-title em {
    font-style: italic;
    color: var(--accent);
  }
  .program-meta {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .meta-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .meta-value { font-size: 13px; font-weight: 500; color: var(--text); }

  /* Phase selector */
  .phases-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 24px 40px;
  }
  .phase-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    color: var(--muted);
    position: relative;
    overflow: hidden;
  }
  .phase-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .phase-btn.p1::before { background: var(--p1bg); }
  .phase-btn.p2::before { background: var(--p2bg); }
  .phase-btn.p3::before { background: var(--p3bg); }
  .phase-btn.active { border-color: transparent; color: var(--text); }
  .phase-btn.p1.active { border-color: rgba(74,127,165,0.4); }
  .phase-btn.p2.active { border-color: rgba(200,122,58,0.4); }
  .phase-btn.p3.active { border-color: rgba(176,80,64,0.4); }
  .phase-btn.active::before { opacity: 1; }
  .phase-dot {
    width: 6px; height: 6px; border-radius: 50%;
    margin-bottom: 8px;
    display: block;
  }
  .p1 .phase-dot { background: var(--p1); }
  .p2 .phase-dot { background: var(--p2); }
  .p3 .phase-dot { background: var(--p3); }
  .phase-name { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 2px; }
  .phase-weeks { font-size: 11px; opacity: 0.6; display: block; }

  /* Week strip */
  .week-strip {
    padding: 0 40px 20px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .week-strip::-webkit-scrollbar { display: none; }
  .week-pill {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .week-pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .week-pill.active { background: var(--accent); border-color: var(--accent); color: #0d0d0f; font-weight: 600; }

  /* Main content */
  .main { padding: 0 40px 60px; }

  /* Current week banner */
  .week-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .week-banner-left { display: flex; align-items: center; gap: 16px; }
  .week-number {
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .week-info { display: flex; flex-direction: column; gap: 4px; }
  .week-info-title { font-size: 14px; font-weight: 500; }
  .week-info-sub { font-size: 12px; color: var(--muted); }
  .progress-bar-wrap { flex: 1; min-width: 120px; max-width: 200px; }
  .progress-bar-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .progress-bar { background: rgba(255,255,255,0.06); border-radius: 100px; height: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

  /* Tip card */
  .tip-card {
    background: linear-gradient(135deg, rgba(200,169,126,0.1), rgba(200,169,126,0.04));
    border: 1px solid rgba(200,169,126,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  /* Day cards */
  .days-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .day-card:hover { border-color: rgba(255,255,255,0.12); }

  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .day-card.open .day-header { border-color: var(--border); }
  .day-stripe {
    width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0;
  }
  .lundi .day-stripe { background: #7b6cf5; }
  .mardi .day-stripe { background: #4a7fa5; }
  .mercredi .day-stripe { background: #7b6cf5; }
  .jeudi .day-stripe { background: #3a9e7e; }
  .vendredi .day-stripe { background: #c87a3a; }
  .samedi .day-stripe { background: #b05040; }
  .repos .day-stripe { background: rgba(255,255,255,0.2); }

  .day-info { flex: 1; }
  .day-name { font-size: 13px; font-weight: 500; }
  .day-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .day-toggle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: none;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .day-card.open .day-toggle { background: rgba(200,169,126,0.15); color: var(--accent); transform: rotate(45deg); }

  .day-body {
    display: none;
    padding: 0;
  }
  .day-card.open .day-body { display: block; }

  /* Exercise table */
  .ex-table {
    width: 100%;
    border-collapse: collapse;
  }
  .ex-table thead tr {
    background: var(--surface2);
  }
  .ex-table th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 20px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .ex-table td {
    padding: 11px 20px;
    font-size: 12.5px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    line-height: 1.4;
  }
  .ex-table tr:last-child td { border-bottom: none; }
  .ex-table tr:hover td { background: rgba(255,255,255,0.02); }
  .td-charge {
    font-weight: 600;
    color: var(--accent2);
  }
  .badge-new {
    font-size: 9px;
    font-weight: 600;
    background: rgba(200,122,58,0.2);
    color: #e8a060;
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    vertical-align: middle;
  }

  .day-tip {
    padding: 10px 20px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
    line-height: 1.6;
  }
  .day-tip::before { content: '◆ '; color: var(--accent); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .day-card { animation: fadeIn 0.3s ease both; }
  .day-card:nth-child(1) { animation-delay: 0.04s; }
  .day-card:nth-child(2) { animation-delay: 0.08s; }
  .day-card:nth-child(3) { animation-delay: 0.12s; }
  .day-card:nth-child(4) { animation-delay: 0.16s; }
  .day-card:nth-child(5) { animation-delay: 0.20s; }
  .day-card:nth-child(6) { animation-delay: 0.24s; }
  .day-card:nth-child(7) { animation-delay: 0.28s; }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 32px 20px 0; }
    .phases-bar { padding: 20px; gap: 8px; }
    .phase-name { font-size: 10px; }
    .week-strip { padding: 0 20px 16px; }
    .main { padding: 0 20px 48px; }
    .ex-table th, .ex-table td { padding: 8px 14px; }
    .day-header { padding: 12px 14px; }
    .header::after { font-size: 160px; }
    .week-number { font-size: 36px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="program-eyebrow">Programme personnel</div>
  <div class="header-top">
    <div>
      <h1 class="program-title">Jouhaina<br><em>12 Semaines</em></h1>
    </div>
  </div>
  <div class="program-meta">
    <div class="meta-item">
      <span class="meta-label">Objectif</span>
      <span class="meta-value">Fessiers & Silhouette</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Séances / semaine</span>
      <span class="meta-value">6 jours actifs</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Phases</span>
      <span class="meta-value">Activation → Construction → Transformation</span>
    </div>
  </div>
</header>

<div class="phases-bar">
  <button class="phase-btn p1 active" onclick="selectPhase(1,this)">
    <span class="phase-dot"></span>
    <span class="phase-name">Activation</span>
    <span class="phase-weeks">Sem. 1 – 4</span>
  </button>
  <button class="phase-btn p2" onclick="selectPhase(2,this)">
    <span class="phase-dot"></span>
    <span class="phase-name">Construction</span>
    <span class="phase-weeks">Sem. 5 – 8</span>
  </button>
  <button class="phase-btn p3" onclick="selectPhase(3,this)">
    <span class="phase-dot"></span>
    <span class="phase-name">Transformation</span>
    <span class="phase-weeks">Sem. 9 – 12</span>
  </button>
</div>

<div class="week-strip" id="weekStrip"></div>

<main class="main" id="main"></main>

<script>
const PROG = {
  lundi: {
    label: "Lundi",
    sub: "Fessiers lourd",
    cls: "lundi",
    exos: [
      ["Hip thrust","4 × 12","30 kg","35 kg","42 kg","50 kg","58 kg","65–70 kg"],
      ["Squat guidé","4 × 10","20 kg","22 kg","28 kg","35 kg","42 kg","48–50 kg"],
      ["Presse cuisses","4 × 12","50 kg","60 kg","70 kg","90 kg","105 kg","115–120 kg"],
      ["Abducteurs","4 × 20","25 kg","30 kg","35 kg","42 kg","50 kg","58–60 kg"],
      ["Kickback","3 × 15","10 kg","12 kg","15 kg","18 kg","22 kg","25 kg"]
    ],
    tips: {
      1: "Semaine 1 : apprends les mouvements, priorité à la technique. Descente lente (3 sec) sur chaque rep.",
      5: "Phase 2 : les charges montent sérieusement. Si 12 reps sont trop faciles, ajoute 5 kg la semaine suivante.",
      9: "Phase 3 : intensification. Ajoute un drop-set sur le dernier set du hip thrust."
    }
  },
  mardi: {
    label: "Mardi",
    sub: "Haut du corps + abdos",
    cls: "mardi",
    exos: [
      ["Tirage dos","4 × 12","20 kg","22 kg","28 kg","35 kg","40 kg","45 kg"],
      ["Rowing barre","4 × 12","15 kg","18 kg","22 kg","30 kg","35 kg","40 kg"],
      ["Chest press incliné ✦","4 × 12","10 kg","12 kg","16 kg","22 kg","27 kg","32 kg"],
      ["Écarté haltères ✦","3 × 15","4 kg","5 kg","6 kg","8 kg","10 kg","12 kg"],
      ["Épaules haltères","3 × 15","5 kg","6 kg","8 kg","10 kg","11 kg","12 kg"],
      ["Gainage planche","3 × max","40 s","50 s","55 s","65 s","75 s","90 s"]
    ]
  },
  mercredi: {
    label: "Mercredi",
    sub: "Fessiers léger + Pilates",
    cls: "mercredi",
    exos: [
      ["Hip thrust léger","4 × 15","22 kg","25 kg","32 kg","42 kg","50 kg","58 kg"],
      ["Fentes marchées","4 × 12/jambe","BW","5 kg/main","6 kg","8 kg","10 kg","12 kg"],
      ["Abducteurs","3 × 20","22 kg","25 kg","30 kg","38 kg","45 kg","52 kg"],
      ["Cours Pilates","45 min","Bases","Bases","Intermédiaire","Intermédiaire","Avancé","Avancé"]
    ]
  },
  jeudi: {
    label: "Jeudi",
    sub: "Piscine + centre aquatique",
    cls: "jeudi",
    exos: [
      ["Nage (brasse/crawl)","30–40 min","30 min","30 min","35 min","35 min","40 min","40 min"],
      ["Sauna","10 min","—","10 min","10 min","10 min","10 min","10 min"],
      ["Bain nordique / froid","1–2 min","—","1 min","1 min","1–2 min","2 min","2 min"],
      ["Hammam","5 min","—","5 min","5 min","5 min","5 min","5 min"]
    ],
    tips: { 3: "Protocole anti-cellulite : sauna 10 min → bain froid 1–2 min → hammam 5 min → repos 5 min." }
  },
  vendredi: {
    label: "Vendredi",
    sub: "Cours collectifs",
    cls: "vendredi",
    exos: [
      ["Abdo-fessiers OU Condition physique","50–60 min","Niveau 1","Niveau 1","Niveau 2","Niveau 2","Niveau 3","Niveau 3"],
      ["Gainage post-cours","3 × max","30 s","40 s","50 s","60 s","75 s","90 s"]
    ]
  },
  samedi: {
    label: "Samedi",
    sub: "Course à pied",
    cls: "samedi",
    exos: [
      ["Type de séance","—","Zone 2 continue","Zone 2 continue","Fractionné 10×30/30","Fractionné 12×30/30","Pyramide 1-2-3-2-1 min","Pyramide + 5 min Z2"],
      ["Durée totale","—","30 min","30 min","25 min","28 min","35 min","40 min"]
    ]
  },
  repos: {
    label: "Dimanche",
    sub: "Repos actif",
    cls: "repos",
    exos: [
      ["Marche / mobilité","20–30 min","Marche","Marche","Marche + étirements","Marche + mobilité hanches","Yoga ou mobilité","Yoga ou mobilité"]
    ]
  }
};

const WEEK_TIPS = {
  1: "Première semaine : ne cherche pas à aller lourd. Maîtrise chaque mouvement, sens le muscle travailler.",
  4: "Fin phase 1 : tu dois sentir les fessiers sur chaque rep du hip thrust. Si ce n'est pas le cas, travaille l'activation avec mini-band.",
  8: "Mi-programme : évaluation. Compare tes photos de début et de semaine 8. Les fesses doivent être visiblement plus rondes.",
  12: "Dernière semaine : programme terminé ! Maintiens 2–3 séances/semaine pour consolider les résultats."
};

function colIdx(w) {
  if(w<=2) return 2; if(w<=4) return 3; if(w<=6) return 4;
  if(w<=8) return 5; if(w<=10) return 6; return 7;
}

function getPhase(w) {
  if(w<=4) return {n:1, label:"Phase 1 — Activation", color:"var(--p1)"};
  if(w<=8) return {n:2, label:"Phase 2 — Construction", color:"var(--p2)"};
  return {n:3, label:"Phase 3 — Transformation", color:"var(--p3)"};
}

let currentWeek = 1;

// Build week strip
const strip = document.getElementById('weekStrip');
for(let w=1; w<=12; w++) {
  const btn = document.createElement('button');
  btn.className = 'week-pill' + (w===1?' active':'');
  btn.textContent = 'S'+w;
  btn.dataset.week = w;
  btn.onclick = () => setWeek(w);
  strip.appendChild(btn);
}

function selectPhase(n, el) {
  document.querySelectorAll('.phase-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const firstWeek = (n-1)*4+1;
  setWeek(firstWeek);
}

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.week-pill').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.week)===w);
  });
  // Sync phase buttons
  const ph = getPhase(w);
  document.querySelectorAll('.phase-btn').forEach((b,i)=>{
    b.classList.toggle('active', i+1===ph.n);
  });
  renderMain(w);
  // Scroll week into view
  const activePill = strip.querySelector('.week-pill.active');
  if(activePill) activePill.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function renderMain(w) {
  const ph = getPhase(w);
  const ci = colIdx(w);
  const pct = Math.round((w/12)*100);

  let html = `
    <div class="week-banner">
      <div class="week-banner-left">
        <div class="week-number">${w}</div>
        <div class="week-info">
          <div class="week-info-title">${ph.label}</div>
          <div class="week-info-sub">Semaine ${w} sur 12</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-label">Progression globale</div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">${pct}% complété</div>
      </div>
    </div>`;

  if(WEEK_TIPS[w]) {
    html += `<div class="tip-card"><span class="tip-icon">✦</span><span>${WEEK_TIPS[w]}</span></div>`;
  }

  html += `<div class="days-grid">`;

  Object.values(PROG).forEach(day => {
    const charge = day.exos[0][ci] || day.exos[0][2];
    html += `<div class="day-card ${day.cls}" id="card-${day.cls}">
      <div class="day-header" onclick="toggleDay('${day.cls}')">
        <div class="day-stripe"></div>
        <div class="day-info">
          <div class="day-name">${day.label}</div>
          <div class="day-sub">${day.sub}</div>
        </div>
        <button class="day-toggle" aria-label="Ouvrir">+</button>
      </div>
      <div class="day-body">
        <table class="ex-table">
          <thead><tr><th>Exercice</th><th>Séries × reps</th><th>Cette semaine</th></tr></thead>
          <tbody>`;

    day.exos.forEach(ex => {
      const val = ex[ci] || ex[2];
      const isKg = val && val.includes('kg');
      const isStar = ex[0].includes('✦');
      const name = ex[0].replace('✦','');
      html += `<tr>
        <td>${name}${isStar?'<span class="badge-new">ajouté</span>':''}</td>
        <td>${ex[1]}</td>
        <td class="${isKg?'td-charge':''}">${val}</td>
      </tr>`;
    });

    html += `</tbody></table>`;

    // Day tips
    const tips = day.tips || {};
    let tipText = '';
    for(let tw in tips) { if(w >= parseInt(tw)) tipText = tips[tw]; }
    if(tipText) html += `<div class="day-tip">${tipText}</div>`;

    html += `</div></div>`;
  });

  html += `</div>`;
  const main = document.getElementById('main');
  main.innerHTML = html;
}

function toggleDay(cls) {
  const card = document.getElementById('card-'+cls);
  card.classList.toggle('open');
}

renderMain(1);
</script>
